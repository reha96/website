<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="'Segoe UI', 'Inter', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="114%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <linearGradient id="classGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="instGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="dictGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>

    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="460" rx="14" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ============================================== -->
  <!-- TOP: Class Dog + __dict__ (single merged box)  -->
  <!-- ============================================== -->

  <rect x="190" y="24" width="400" height="130" rx="10" fill="white" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>

  <!-- Class header bar -->
  <rect x="190" y="24" width="400" height="42" rx="10" fill="url(#classGrad)"/>
  <rect x="190" y="56" width="400" height="10" fill="url(#classGrad)"/>
  <text x="390" y="50" text-anchor="middle" fill="white" font-size="16" font-weight="700">class Dog</text>

  <!-- Class attr line -->
  <text x="390" y="78" text-anchor="middle" fill="#4F46E5" font-size="12" font-weight="600">species = "Canis familiaris"   ← Class Attribute (shared)</text>

  <!-- Separator -->
  <line x1="210" y1="90" x2="570" y2="90" stroke="#E0E7FF" stroke-width="1"/>

  <!-- __dict__ section -->
  <text x="390" y="108" text-anchor="middle" fill="#6B7280" font-size="11" font-weight="600">Dog.__dict__</text>
  <text x="390" y="126" text-anchor="middle" fill="#9CA3AF" font-size="10">{"species": "Canis familiaris", "__init__": &lt;function&gt;, "__doc__": None, ...}</text>

  <!-- ============================================== -->
  <!-- ARROWS: instances → class (fallback lookup)    -->
  <!-- ============================================== -->

  <!-- Left arrow: from dog1 up to class -->
  <path d="M 250 260 L 250 200 L 310 200 L 310 160"
        stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowGray)"/>

  <!-- Right arrow: from dog2 up to class -->
  <path d="M 530 260 L 530 200 L 470 200 L 470 160"
        stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrowGray)"/>

  <!-- Arrow labels -->
  <rect x="170" y="193" width="190" height="24" rx="5" fill="white" filter="url(#shadow)"/>
  <text x="265" y="209" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="600">② Fallback to class __dict__</text>

  <rect x="420" y="193" width="190" height="24" rx="5" fill="white" filter="url(#shadow)"/>
  <text x="515" y="209" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="600">② Fallback to class __dict__</text>

  <!-- ============================================== -->
  <!-- BOTTOM LEFT: dog1 instance                     -->
  <!-- ============================================== -->

  <rect x="55" y="261" width="310" height="132" rx="10" fill="white" stroke="#0D9488" stroke-width="2" filter="url(#shadow)"/>

  <!-- dog1 header bar -->
  <rect x="55" y="261" width="310" height="40" rx="10" fill="url(#instGrad)"/>
  <rect x="55" y="291" width="310" height="10" fill="url(#instGrad)"/>
  <text x="210" y="286" text-anchor="middle" fill="white" font-size="14" font-weight="700">dog1 = Dog("Rex", 3)</text>

  <!-- Instance attrs -->
  <text x="210" y="313" text-anchor="middle" fill="#0D9488" font-size="11" font-weight="600">name = "Rex"   ← Instance Attribute (unique)</text>
  <text x="210" y="331" text-anchor="middle" fill="#0D9488" font-size="11" font-weight="600">age = 3        ← Instance Attribute (unique)</text>

  <!-- separator -->
  <line x1="75" y1="343" x2="345" y2="343" stroke="#CCFBF1" stroke-width="1"/>

  <text x="210" y="361" text-anchor="middle" fill="#6B7280" font-size="10">dog1.__dict__ = {"name": "Rex", "age": 3}</text>

  <!-- ① label -->
  <rect x="155" y="367" width="110" height="22" rx="4" fill="#0D9488" opacity="0.1"/>
  <text x="210" y="382" text-anchor="middle" fill="#0D9488" font-size="12" font-weight="700">① Check here first</text>

  <!-- ============================================== -->
  <!-- BOTTOM RIGHT: dog2 instance                    -->
  <!-- ============================================== -->

  <rect x="415" y="261" width="310" height="132" rx="10" fill="white" stroke="#0D9488" stroke-width="2" filter="url(#shadow)"/>

  <!-- dog2 header bar -->
  <rect x="415" y="261" width="310" height="40" rx="10" fill="url(#instGrad)"/>
  <rect x="415" y="291" width="310" height="10" fill="url(#instGrad)"/>
  <text x="570" y="286" text-anchor="middle" fill="white" font-size="14" font-weight="700">dog2 = Dog("Bella", 5)</text>

  <!-- Instance attrs -->
  <text x="570" y="313" text-anchor="middle" fill="#0D9488" font-size="11" font-weight="600">name = "Bella"   ← Instance Attribute (unique)</text>
  <text x="570" y="331" text-anchor="middle" fill="#0D9488" font-size="11" font-weight="600">age = 5          ← Instance Attribute (unique)</text>

  <!-- separator -->
  <line x1="435" y1="343" x2="705" y2="343" stroke="#CCFBF1" stroke-width="1"/>

  <text x="570" y="361" text-anchor="middle" fill="#6B7280" font-size="10">dog2.__dict__ = {"name": "Bella", "age": 5}</text>

  <!-- ① label -->
  <rect x="515" y="367" width="110" height="22" rx="4" fill="#0D9488" opacity="0.1"/>
  <text x="570" y="382" text-anchor="middle" fill="#0D9488" font-size="12" font-weight="700">① Check here first</text>

  <!-- ============================================== -->
  <!-- Bottom explanation                             -->
  <!-- ============================================== -->

  <text x="390" y="438" text-anchor="middle" fill="#6B7280" font-size="12">
    dog1.species → ① instance.__dict__ (not found) → ② class.__dict__ (found!) ✅
  </text>
  <text x="390" y="455" text-anchor="middle" fill="#9CA3AF" font-size="10">Class attributes are <tspan font-weight="700" fill="#4F46E5">shared</tspan> by all instances. Instance attributes are <tspan font-weight="700" fill="#0D9488">unique</tspan> per object.</text>
</svg>